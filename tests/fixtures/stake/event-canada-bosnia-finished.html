<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="stake:event-id" content="canada-bosnia-demo" />
    <meta name="stake:home-team" content="Canadá" />
    <meta name="stake:away-team" content="Bosnia y Herzegovina" />
    <meta name="stake:competition" content="Copa Mundial 2026 · Grupo B" />
    <meta name="stake:kickoff-at" content="2026-06-12T19:00:00.000Z" />
    <title>Canadá vs Bosnia y Herzegovina</title>
  </head>
  <body
    data-event-id="canada-bosnia-demo"
    data-home-team="Canadá"
    data-away-team="Bosnia y Herzegovina"
  >
    <main>
      <section
        class="wol-market"
        data-market-id="m-result"
        data-market-name="Resultado"
      >
        <h2 class="market-title">Resultado</h2>
        <button
          data-event-odd-id="s-home"
          data-odd-id="odd-home"
          data-selection-name="Canadá"
          data-odd-value="1.86"
          data-odd-team_side="home"
        >
          Canadá
        </button>
        <button
          data-event-odd-id="s-draw"
          data-odd-id="odd-draw"
          data-selection-name="Empate"
          data-odd-value="3.40"
        >
          Empate
        </button>
        <button
          data-event-odd-id="s-away"
          data-odd-id="odd-away"
          data-selection-name="Bosnia y Herzegovina"
          data-odd-value="4.20"
          data-odd-team_side="away"
        >
          Bosnia y Herzegovina
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-double-chance"
        data-market-name="Doble oportunidad"
      >
        <h2 class="market-title">Doble oportunidad</h2>
        <button
          data-event-odd-id="s-dc-1x"
          data-odd-id="odd-dc-1x"
          data-selection-name="1X"
          data-odd-value="1.22"
        >
          1X
        </button>
        <button
          data-event-odd-id="s-dc-12"
          data-odd-id="odd-dc-12"
          data-selection-name="12"
          data-odd-value="1.32"
        >
          12
        </button>
        <button
          data-event-odd-id="s-dc-x2"
          data-odd-id="odd-dc-x2"
          data-selection-name="X2"
          data-odd-value="1.85"
        >
          X2
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-dnb"
        data-market-name="Ganador sin empate"
      >
        <h2 class="market-title">Ganador sin empate</h2>
        <button
          data-event-odd-id="s-dnb-home"
          data-odd-id="odd-dnb-home"
          data-selection-name="Canadá"
          data-odd-value="1.38"
        >
          Canadá
        </button>
        <button
          data-event-odd-id="s-dnb-away"
          data-odd-id="odd-dnb-away"
          data-selection-name="Bosnia y Herzegovina"
          data-odd-value="2.95"
        >
          Bosnia y Herzegovina
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-total-goals"
        data-market-name="Total de goles"
      >
        <h2 class="market-title">Total de goles</h2>
        <button
          data-event-odd-id="s-goals-over-05"
          data-odd-id="odd_GOALS_OVR_0_5"
          data-selection-name="Más de 0.5"
          data-odd-value="1.07"
          data-additional-value="0.5"
          data-odd-ttl="_OVR"
        >
          Más de 0.5
        </button>
        <button
          data-event-odd-id="s-goals-over-15"
          data-odd-id="odd_GOALS_OVR_1_5"
          data-selection-name="Más de 1.5"
          data-odd-value="1.34"
          data-additional-value="1.5"
          data-odd-ttl="_OVR"
        >
          Más de 1.5
        </button>
        <button
          data-event-odd-id="s-goals-over-25"
          data-odd-id="odd_GOALS_OVR_2_5"
          data-selection-name="Más de 2.5"
          data-odd-value="2.08"
          data-additional-value="2.5"
          data-odd-ttl="_OVR"
        >
          Más de 2.5
        </button>
        <button
          data-event-odd-id="s-goals-under-25"
          data-odd-id="odd_GOALS_UND_2_5"
          data-selection-name="Menos de 2.5"
          data-odd-value="1.74"
          data-additional-value="2.5"
          data-odd-ttl="_UND"
        >
          Menos de 2.5
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-btts"
        data-market-name="Ambos equipos marcan"
      >
        <h2 class="market-title">Ambos equipos marcan</h2>
        <button
          data-event-odd-id="s-btts-yes"
          data-odd-id="odd-btts-yes"
          data-selection-name="Sí"
          data-odd-value="1.95"
        >
          Sí
        </button>
        <button
          data-event-odd-id="s-btts-no"
          data-odd-id="odd-btts-no"
          data-selection-name="No"
          data-odd-value="1.82"
        >
          No
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-first-goal"
        data-market-name="Equipo que marca primero"
      >
        <h2 class="market-title">Equipo que marca primero</h2>
        <button
          data-event-odd-id="s-first-home"
          data-odd-id="odd-first-home"
          data-selection-name="Canadá"
          data-odd-value="1.62"
        >
          Canadá
        </button>
        <button
          data-event-odd-id="s-first-away"
          data-odd-id="odd-first-away"
          data-selection-name="Bosnia y Herzegovina"
          data-odd-value="2.45"
        >
          Bosnia y Herzegovina
        </button>
        <button
          data-event-odd-id="s-first-none"
          data-odd-id="odd-first-none"
          data-selection-name="Ninguno"
          data-odd-value="9.50"
        >
          Ninguno
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-yellow-cards"
        data-market-name="Total de tarjetas amarillas"
      >
        <h2 class="market-title">Total de tarjetas amarillas</h2>
        <button
          data-event-odd-id="s-cards-over-45"
          data-odd-id="odd_CARDS_OVR_4_5"
          data-selection-name="Más de 4.5"
          data-odd-value="2.10"
          data-additional-value="4.5"
          data-odd-ttl="_OVR"
        >
          Más de 4.5
        </button>
        <button
          data-event-odd-id="s-cards-under-45"
          data-odd-id="odd_CARDS_UND_4_5"
          data-selection-name="Menos de 4.5"
          data-odd-value="1.70"
          data-additional-value="4.5"
          data-odd-ttl="_UND"
        >
          Menos de 4.5
        </button>
      </section>

      <section
        class="wol-market"
        data-market-id="m-corners"
        data-market-name="Total de córners"
      >
        <h2 class="market-title">Total de córners</h2>
        <button
          data-event-odd-id="s-corners-over-85"
          data-odd-id="odd_CORNERS_OVR_8_5"
          data-selection-name="Más de 8.5"
          data-odd-value="1.90"
          data-additional-value="8.5"
          data-odd-ttl="_OVR"
        >
          Más de 8.5
        </button>
        <button
          data-event-odd-id="s-corners-under-85"
          data-odd-id="odd_CORNERS_UND_8_5"
          data-selection-name="Menos de 8.5"
          data-odd-value="1.88"
          data-additional-value="8.5"
          data-odd-ttl="_UND"
        >
          Menos de 8.5
        </button>
      </section>
    </main>
  </body>
</html>
